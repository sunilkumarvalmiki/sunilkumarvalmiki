name: Daily profile sync

on:
  schedule:
    # Runs every day at 06:00 Asia/Kolkata.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-profile:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_PROFILE_TOKEN: ${{ secrets.GH_PROFILE_TOKEN }}
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate README from profile data
        run: python scripts/update_profile.py

      - name: Commit README updates
        run: |
          if git diff --quiet; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Automate daily profile refresh"
          git push

      - name: Sync GitHub profile metadata
        if: env.GH_PROFILE_TOKEN != ''
        run: python scripts/update_profile.py --skip-readme --sync-github-profile

      - name: Explain skipped metadata sync
        if: env.GH_PROFILE_TOKEN == ''
        run: |
          echo "Skipped GitHub profile metadata sync."
          echo "Add a GH_PROFILE_TOKEN repository secret with permission to update the authenticated user profile to sync bio, company, location, and hiring status."
